name: CI

on:
  push:
    branches: [main]

jobs:
  build-and-dispatch:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set image tag (SHA 7자리)
        id: tag
        run: echo "sha=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push to GHCR with Retry
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 10
          max_attempts: 3
          retry_on: error
          command: |
            docker buildx build \
              --platform linux/amd64,linux/arm64 \
              --push \
              --cache-from type=gha \
              --cache-to type=gha,mode=max \
              -t ghcr.io/fluanceifi/resume-backend:${{ steps.tag.outputs.sha }} \
              . # [필독] 백엔드의 도커파일 위치에 따라 변경 필수

      - name: Notify Failure
        if: failure()
        uses: appleboy/discord-action@master
        with:
          webhook_id: ${{ secrets.DISCORD_WEBHOOK_ID }}
          webhook_token: ${{ secrets.DISCORD_WEBHOOK_TOKEN }}
          color: "#ff0000"
          message: |
            ❌ **배포 빌드 실패**
            - 레포지토리: ${{ github.repository }}
            - 커밋: ${{ steps.tag.outputs.sha }}
            - 로그: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

      - name: Dispatch to infra repo
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.INFRA_REPO_PAT }}
          repository: fluanceifi/resume-infra
          event-type: deploy
          client-payload: |
            {
              "service": "backend",
              "image_tag": "${{ steps.tag.outputs.sha }}",
              "actor": "${{ github.actor }}",
              "sha": "${{ github.sha }}"
            }

      - name: Notify Success
        if: success()
        uses: appleboy/discord-action@master
        with:
          webhook_id: ${{ secrets.DISCORD_WEBHOOK_ID }}
          webhook_token: ${{ secrets.DISCORD_WEBHOOK_TOKEN }}
          color: "#00ff00" #/초록
          message: | #줄바꿈
            ✅ **배포 빌드 성공**
            - 레포지토리: ${{ github.repository }}
            - 커밋: ${{ steps.tag.outputs.sha }}
            - 상태: 이미지가 GHCR에 푸쉬되고, 인프라 레포로 전달되었습니다.