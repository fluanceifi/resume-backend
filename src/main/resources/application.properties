spring.application.name=spring-ai-tutorial
spring.config.import=optional:file:.env[.properties]

# Server Configuration
server.port=8080

# OpenAI API Configuration
spring.ai.openai.api-key=${OPENAI_API_KEY}
spring.ai.openai.embedding.options.model=text-embedding-3-large

# OpenSearch Vector Store
spring.ai.vectorstore.opensearch.uris=http://${OPENSEARCH_HOST:localhost}:${OPENSEARCH_PORT:9200}
spring.ai.vectorstore.opensearch.index-name=portfolio-vectors
spring.ai.vectorstore.opensearch.initialize-schema=true

# MySQL
spring.datasource.url=jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DATABASE:portfolio_db}?useSSL=false&serverTimezone=Asia/Seoul&allowPublicKeyRetrieval=true
spring.datasource.username=${MYSQL_USER:root}
spring.datasource.password=${MYSQL_PASSWORD:1234}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=create
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.show-sql=false

# File Upload Settings
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB

# Swagger/OpenAPI Configuration
springdoc.api-docs.path=/api-docs

# Actuator
management.endpoints.web.exposure.include=health

logging.level.com.example.spring_ai_tutorial=DEBUG
